openapi: 3.0.3
info:
  title: Myth Cloth API
  version: 1.0.0
  description: REST API documentation generated from the current controllers and DTOs.
servers:
  - url: /api/v1
    description: Relative to current host
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: Anniversaries
  - name: Catalogs
  - name: Distributors
  - name: Figurines
  - name: Figurine Events
  - name: Figurine Images

paths:
  /anniversaries:
    get:
      tags: [Anniversaries]
      summary: List anniversaries
      operationId: retrieveAnniversaries
      responses:
        '200':
          description: List of anniversaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnniversaryResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Anniversaries]
      summary: Create anniversary
      operationId: createAnniversary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnniversaryReq'
      responses:
        '201':
          description: Anniversary created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnniversaryResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /anniversaries/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Anniversaries]
      summary: Get anniversary by id
      operationId: retrieveAnniversary
      responses:
        '200':
          description: Anniversary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnniversaryResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    put:
      tags: [Anniversaries]
      summary: Update anniversary
      operationId: updateAnniversary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnniversaryReq'
      responses:
        '200':
          description: Updated anniversary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnniversaryResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Anniversaries]
      summary: Delete anniversary
      operationId: removeAnniversary
      responses:
        '204':
          description: Anniversary deleted
        default:
          $ref: '#/components/responses/ProblemResponse'

  /catalogs/{catalogType}:
    parameters:
      - $ref: '#/components/parameters/CatalogTypePathParam'
    get:
      tags: [Catalogs]
      summary: List catalog entries by type
      operationId: retrieveCatalogs
      responses:
        '200':
          description: List of catalog entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Catalogs]
      summary: Create catalog entry
      operationId: createCatalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogReq'
      responses:
        '201':
          description: Catalog entry created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /catalogs/{catalogType}/{id}:
    parameters:
      - $ref: '#/components/parameters/CatalogTypePathParam'
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Catalogs]
      summary: Get catalog entry by id
      operationId: retrieveCatalog
      responses:
        '200':
          description: Catalog entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    put:
      tags: [Catalogs]
      summary: Update catalog entry
      operationId: updateCatalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogReq'
      responses:
        '200':
          description: Updated catalog entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Catalogs]
      summary: Delete catalog entry
      operationId: removeCatalog
      responses:
        '204':
          description: Catalog entry deleted
        default:
          $ref: '#/components/responses/ProblemResponse'

  /distributors:
    get:
      tags: [Distributors]
      summary: List distributors
      operationId: retrieveDistributors
      responses:
        '200':
          description: List of distributors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DistributorResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Distributors]
      summary: Create distributor
      operationId: createDistributor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DistributorReq'
      responses:
        '201':
          description: Distributor created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributorResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /distributors/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Distributors]
      summary: Get distributor by id
      operationId: retrieveDistributor
      responses:
        '200':
          description: Distributor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributorResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    put:
      tags: [Distributors]
      summary: Update distributor
      operationId: updateDistributor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DistributorReq'
      responses:
        '200':
          description: Updated distributor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributorResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Distributors]
      summary: Delete distributor
      operationId: removeDistributor
      responses:
        '204':
          description: Distributor deleted
        default:
          $ref: '#/components/responses/ProblemResponse'

  /figurines:
    get:
      tags: [Figurines]
      summary: List figurines (paginated)
      operationId: retrieveFigurines
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Paginated figurine result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Figurines]
      summary: Create figurine
      operationId: createFigurine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FigurineReq'
      responses:
        '201':
          description: Figurine created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /figurines/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Figurines]
      summary: Get figurine by id
      operationId: retrieveFigurine
      responses:
        '200':
          description: Figurine
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    put:
      tags: [Figurines]
      summary: Update figurine
      operationId: updateFigurine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FigurineReq'
      responses:
        '200':
          description: Updated figurine
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Figurines]
      summary: Delete figurine
      operationId: deleteFigurine
      responses:
        '204':
          description: Figurine deleted
        default:
          $ref: '#/components/responses/ProblemResponse'

  /figurines/{figurineId}/events:
    parameters:
      - $ref: '#/components/parameters/FigurineIdPathParam'
    get:
      tags: [Figurine Events]
      summary: List figurine events
      operationId: retrieveEvents
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FigurineEventResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Figurine Events]
      summary: Create figurine event
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FigurineEventReq'
      responses:
        '201':
          description: Event created
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineEventResp'
        default:
          $ref: '#/components/responses/ProblemResponse'

  /figurines/{figurineId}/events/{id}:
    parameters:
      - $ref: '#/components/parameters/FigurineIdPathParam'
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Figurine Events]
      summary: Get figurine event by id
      operationId: retrieveEvent
      responses:
        '200':
          description: Figurine event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineEventResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    put:
      tags: [Figurine Events]
      summary: Update figurine event
      operationId: updateEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FigurineEventReq'
      responses:
        '200':
          description: Updated figurine event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineEventResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Figurine Events]
      summary: Delete figurine event
      operationId: removeEvent
      responses:
        '204':
          description: Event deleted
        default:
          $ref: '#/components/responses/ProblemResponse'

  /figurines/{figurineId}/images:
    parameters:
      - $ref: '#/components/parameters/FigurineIdPathParam'
    get:
      tags: [Figurine Images]
      summary: List figurine images
      operationId: retrieveImages
      parameters:
        - in: query
          name: isOfficialImage
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Figurine image URLs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineImageResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags: [Figurine Images]
      summary: Create figurine image
      operationId: createImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FigurineImageReq'
      responses:
        '201':
          description: Image added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FigurineImageResp'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Figurine Images]
      summary: Delete figurine image
      operationId: removeImage
      parameters:
        - in: query
          name: imageUrl
          required: true
          schema:
            type: string
            format: uri
        - in: query
          name: isOfficialImage
          schema:
            type: boolean
            default: true
      responses:
        '204':
          description: Image removed
        default:
          $ref: '#/components/responses/ProblemResponse'

components:
  parameters:
    IdPathParam:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    FigurineIdPathParam:
      in: path
      name: figurineId
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    CatalogTypePathParam:
      in: path
      name: catalogType
      required: true
      schema:
        type: string
        enum: [distributions, groups, lineups, series]

  responses:
    ProblemResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    Problem:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        timestamp:
          type: string
          format: date-time
        errors:
          type: object
          additionalProperties:
            type: string
        error:
          type: string

    AnniversaryReq:
      type: object
      required: [description, year]
      properties:
        description:
          type: string
          maxLength: 100
        year:
          type: integer
          minimum: 1

    AnniversaryResp:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string
        year:
          type: integer

    CatalogReq:
      type: object
      required: [description]
      properties:
        description:
          type: string
          maxLength: 100

    CatalogResp:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string

    DistributorReq:
      type: object
      required: [name, countryCode]
      properties:
        name:
          type: string
          enum: [BANDAI, DAM, DTM, BANDAI_CHINA, DS_DISTRIBUTIONS, BLUE_FIN]
        countryCode:
          type: string
          enum: [JP, MX, ES, US, CN]
        website:
          type: string

    DistributorResp:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        countryCode:
          type: string
          enum: [JP, MX, ES, US, CN]
        website:
          type: string

    FigurineDistributorReq:
      type: object
      properties:
        supplierId:
          type: integer
          format: int64
          minimum: 1
        currency:
          type: string
          enum: [JPY, MXN, EUR, USD, CNY, CAD]
        price:
          type: number
          format: double
          minimum: 0.01
        announcedAt:
          type: string
          format: date
        preorderOpensAt:
          type: string
          format: date
        releaseDate:
          type: string
          format: date
        releaseDateConfirmed:
          type: boolean
          default: false

    FigurineReq:
      type: object
      required: [name, distributors, lineUpId, seriesId, groupId]
      properties:
        name:
          type: string
          maxLength: 100
        distributors:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/FigurineDistributorReq'
        tamashiiUrl:
          type: string
        distributionId:
          type: integer
          format: int64
        lineUpId:
          type: integer
          format: int64
        seriesId:
          type: integer
          format: int64
        groupId:
          type: integer
          format: int64
        anniversaryId:
          type: integer
          format: int64
        isMetalBody:
          type: boolean
        isOriginalColorEdition:
          type: boolean
        isRevival:
          type: boolean
        isPlainCloth:
          type: boolean
        isBattleDamaged:
          type: boolean
        isGoldenArmor:
          type: boolean
        isGold24kEdition:
          type: boolean
        isMangaVersion:
          type: boolean
        isMultiPack:
          type: boolean
        isArticulable:
          type: boolean
        notes:
          type: string
        officialImageUrls:
          type: array
          items:
            type: string
        unofficialImageUrls:
          type: array
          items:
            type: string

    FigurineDistributorResp:
      type: object
      properties:
        distributor:
          $ref: '#/components/schemas/DistributorResp'
        currency:
          type: string
          enum: [JPY, MXN, EUR, USD, CNY, CAD]
        price:
          type: number
          format: double
        priceWithTax:
          type: number
          format: double
        announcedAt:
          type: string
          format: date
        preorderOpensAt:
          type: string
          format: date
        releaseDate:
          type: string
          format: date
        releaseDateConfirmed:
          type: boolean

    FigurineEventReq:
      type: object
      required: [description, date, region, type, figurineId]
      properties:
        description:
          type: string
          maxLength: 100
        date:
          type: string
          format: date
        region:
          type: string
          enum: [JP, MX, ES, US, CN]
        type:
          type: string
          enum: [ANNOUNCEMENT, PREORDER_OPEN, PREORDER_CLOSE, RELEASE, RESTOCK, LOCAL_CONFIRMATION, LOCAL_RELEASE]
        figurineId:
          type: integer
          format: int64
          minimum: 1

    FigurineEventResp:
      type: object
      properties:
        id:
          type: integer
          format: int64
        date:
          type: string
          format: date
        type:
          type: string
          enum: [ANNOUNCEMENT, PREORDER_OPEN, PREORDER_CLOSE, RELEASE, RESTOCK, LOCAL_CONFIRMATION, LOCAL_RELEASE]
        region:
          type: string
          enum: [JP, MX, ES, US, CN]
        description:
          type: string

    FigurineImageReq:
      type: object
      required: [imageUrl, figurineId]
      properties:
        imageUrl:
          type: string
          format: uri
        isOfficialImage:
          type: boolean
          default: true
        figurineId:
          type: integer
          format: int64
          minimum: 1

    FigurineImageResp:
      type: object
      properties:
        officialImageUrls:
          type: array
          items:
            type: string
            format: uri

    FigurineResp:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        displayableName:
          type: string
        distributors:
          type: array
          items:
            $ref: '#/components/schemas/FigurineDistributorResp'
        tamashiiUrl:
          type: string
        distribution:
          $ref: '#/components/schemas/CatalogResp'
        lineUp:
          $ref: '#/components/schemas/CatalogResp'
        series:
          $ref: '#/components/schemas/CatalogResp'
        group:
          $ref: '#/components/schemas/CatalogResp'
        anniversary:
          $ref: '#/components/schemas/AnniversaryResp'
        isMetalBody:
          type: boolean
        isOriginalColorEdition:
          type: boolean
        isRevival:
          type: boolean
        isPlainCloth:
          type: boolean
        isBattleDamaged:
          type: boolean
        isGoldenArmor:
          type: boolean
        isGold24kEdition:
          type: boolean
        isMangaVersion:
          type: boolean
        isMultiPack:
          type: boolean
        isArticulable:
          type: boolean
        notes:
          type: string
        officialImageUrls:
          type: array
          items:
            type: string
        unofficialImageUrls:
          type: array
          items:
            type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/FigurineEventResp'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaginatedResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/FigurineResp'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

